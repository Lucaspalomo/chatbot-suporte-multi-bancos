<!DOCTYPE html>
<html lang="pt-BR" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Portal Flix</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-zinc-950 text-gray-100 min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-md bg-zinc-900 rounded-xl shadow-2xl border border-zinc-800 p-8">
        
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold tracking-tight text-white">Ecossistema <span class="text-zinc-400 font-light">Flix</span></h1>
            <p class="text-zinc-400 text-xs mt-2">Insira suas credenciais para acessar os portais ERP</p>
        </div>

        {% if mensagem %}
            <div class="mb-4 p-3 bg-red-900/40 border border-red-700 text-red-300 rounded-lg text-xs flex items-center gap-2">
                <i class="fa-solid fa-triangle-exclamation"></i> {{ mensagem }}
            </div>
        {% endif %}

        <form action="/login" method="POST" class="space-y-4">
            <div>
                <label class="block text-xs font-semibold uppercase text-zinc-400 mb-2">E-mail</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-zinc-500">
                        <i class="fa-solid fa-envelope"></i>
                    </span>
                    <input type="email" name="email" required class="w-full pl-10 pr-4 py-2 bg-zinc-950 border border-zinc-800 rounded-lg focus:outline-none focus:border-zinc-600 focus:ring-1 focus:ring-zinc-600 text-sm text-white" placeholder="seuemail@empresa.com">
                </div>
            </div>

            <div>
                <label class="block text-xs font-semibold uppercase text-zinc-400 mb-2">Senha</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-zinc-500">
                        <i class="fa-solid fa-lock"></i>
                    </span>
                    <input type="password" name="senha" required class="w-full pl-10 pr-4 py-2 bg-zinc-950 border border-zinc-800 rounded-lg focus:outline-none focus:border-zinc-600 focus:ring-1 focus:ring-zinc-600 text-sm text-white" placeholder="••••••••">
                </div>
            </div>

            <button type="submit" class="w-full py-2.5 mt-2 bg-zinc-100 hover:bg-white text-zinc-950 font-semibold rounded-lg text-sm transition-colors shadow-lg">
                Entrar no Sistema
            </button>
        </form>

        <div class="mt-6 border-t border-zinc-800 pt-5">
            <p class="text-center text-xs font-semibold uppercase tracking-wider text-zinc-400 mb-4">
                Ainda não tem uma conta?
            </p>
            
            <div class="grid grid-cols-2 gap-3">
                <a href="/facilite/cadastro" class="flex items-center justify-center gap-2 py-2 px-3 bg-red-950/40 hover:bg-red-900/60 border border-red-800/80 hover:border-red-600 text-red-400 hover:text-white font-medium rounded-lg text-xs transition-all text-center shadow-sm">
                    <i class="fa-solid fa-user-plus text-[10px]"></i> Cadastrar Facilite
                </a>

                <a href="/inpera/cadastro" class="flex items-center justify-center gap-2 py-2 px-3 bg-amber-950/30 hover:bg-amber-900/40 border border-amber-800/60 hover:border-amber-500 text-amber-400 hover:text-white font-medium rounded-lg text-xs transition-all text-center shadow-sm">
                    <i class="fa-solid fa-user-plus text-[10px]"></i> Cadastrar Inpera
                </a>
            </div>
        </div>

</body>
</html>
