<!DOCTYPE html>
<html lang="pt-BR" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selecionar Portal - Flix</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-zinc-950 text-gray-100 min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-2xl text-center">
        <h1 class="text-3xl font-bold tracking-tight text-white mb-2">Múltiplos Acessos Encontrados</h1>
        <p class="text-zinc-400 text-sm mb-8">Seu usuário <strong>{{ email }}</strong> está em ambas as bases. Escolha o ecossistema que deseja acessar:</p>

        <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
            
            <form action="/definir_contexto" method="POST">
                <input type="hidden" name="contexto" value="facilite">
                <button type="submit" class="w-full h-full text-left group bg-zinc-900 border border-zinc-800 hover:border-red-600 rounded-xl p-6 transition-all hover:shadow-xl hover:shadow-red-900/10 transform hover:-translate-y-1 focus:outline-none">
                    <div class="w-12 h-12 rounded-lg bg-red-950 border border-red-800 flex items-center justify-center text-red-500 text-xl mb-4 group-hover:bg-red-700 group-hover:text-white transition-colors">
                        <i class="fa-solid fa-layer-group"></i>
                    </div>
                    <h3 class="text-xl font-bold text-white group-hover:text-red-500 transition-colors">Facilite <span class="font-light">Flix</span></h3>
                    <p class="text-zinc-400 text-xs mt-2 leading-relaxed">Acesse rotinas de faturamento, módulos fiscais avançados e suporte inteligente para a linha Facilite ERP.</p>
                    <div class="mt-4 text-xs font-semibold text-red-500 flex items-center gap-1">
                        Acessar Portal <i class="fa-solid fa-arrow-right transition-transform group-hover:translate-x-1"></i>
                    </div>
                </button>
            </form>

            <form action="/definir_contexto" method="POST">
                <input type="hidden" name="contexto" value="inpera">
                <button type="submit" class="w-full h-full text-left group bg-zinc-900 border border-zinc-800 hover:border-amber-500 rounded-xl p-6 transition-all hover:shadow-xl hover:shadow-amber-900/10 transform hover:-translate-y-1 focus:outline-none">
                    <div class="w-12 h-12 rounded-lg bg-amber-950 border border-amber-800 flex items-center justify-center text-amber-500 text-xl mb-4 group-hover:bg-amber-600 group-hover:text-white transition-colors">
                        <i class="fa-solid fa-chart-line"></i>
                    </div>
                    <h3 class="text-xl font-bold text-white group-hover:text-amber-500 transition-colors">Inpera <span class="font-light">Flix</span></h3>
                    <p class="text-zinc-400 text-xs mt-2 leading-relaxed">Gerencie treinamentos corporativos, histórico de auditorias e base de conhecimento focada no ecossistema Inpera.</p>
                    <div class="mt-4 text-xs font-semibold text-amber-500 flex items-center gap-1">
                        Acessar Portal <i class="fa-solid fa-arrow-right transition-transform group-hover:translate-x-1"></i>
                    </div>
                </button>
            </form>

        </div>
    </div>

</body>
</html>
