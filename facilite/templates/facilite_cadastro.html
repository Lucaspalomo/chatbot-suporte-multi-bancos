<!DOCTYPE html>
<html lang="pt-BR" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Facilite Flix</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-zinc-950 text-gray-100 min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-lg bg-zinc-900 rounded-xl shadow-2xl border border-zinc-800 p-8">
        
        <div class="text-center mb-6">
            <h1 class="text-3xl font-bold text-red-600 tracking-tight">Facilite <span class="text-white font-light">Flix</span></h1>
            <p class="text-zinc-400 text-sm mt-2">Crie a sua conta de acesso ao ecossistema ERP</p>
        </div>

        {% if mensagem %}
            {% if sucesso %}
                <div class="mb-6 p-4 bg-green-900/40 border border-green-700 text-green-300 rounded-lg text-sm flex items-center gap-2">
                    <i class="fa-solid fa-circle-check"></i> {{ mensagem }}
                </div>
            {% else %}
                <div class="mb-6 p-4 bg-red-900/40 border border-red-700 text-red-300 rounded-lg text-sm flex items-center gap-2">
                    <i class="fa-solid fa-circle-exclamation"></i> {{ mensagem }}
                </div>
            {% endif %}
        {% endif %}

        <form action="/facilite/cadastro" method="POST" class="space-y-5">
            
            <div>
                <label class="block text-xs font-semibold uppercase tracking-wider text-zinc-400 mb-2">Razão Social / Nome Completo</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-zinc-500">
                        <i class="fa-solid fa-user"></i>
                    </span>
                    <input type="text" name="nome" required class="w-full pl-10 pr-4 py-2.5 bg-zinc-950 border border-zinc-800 rounded-lg focus:outline-none focus:border-red-600 focus:ring-1 focus:ring-red-600 text-sm transition-all" placeholder="Ex: João Silva ou Empresa LTDA">
                </div>
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-semibold uppercase tracking-wider text-zinc-400 mb-2">CPF / CNPJ</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-zinc-500">
                            <i class="fa-solid fa-address-card"></i>
                        </span>
                        <input type="text" name="documento" required class="w-full pl-10 pr-4 py-2.5 bg-zinc-950 border border-zinc-800 rounded-lg focus:outline-none focus:border-red-600 focus:ring-1 focus:ring-red-600 text-sm transition-all" placeholder="00.000.000/0001-00">
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-semibold uppercase tracking-wider text-zinc-400 mb-2">Tipo de Vínculo</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-zinc-500">
                            <i class="fa-solid fa-handshake"></i>
                        </span>
                        <select name="vinculo" required class="w-full pl-10 pr-4 py-2.5 bg-zinc-950 border border-zinc-800 rounded-lg focus:outline-none focus:border-red-600 focus:ring-1 focus:ring-red-600 text-sm transition-all text-zinc-300">
                            <option value="Cliente">Cliente Final</option>
                            <option value="Revenda">Revenda / Parceiro</option>
                        </select>
                    </div>
                </div>
            </div>

            <div>
                <label class="block text-xs font-semibold uppercase tracking-wider text-zinc-400 mb-2">E-mail Corporativo</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-zinc-500">
                        <i class="fa-solid fa-envelope"></i>
                    </span>
                    <input type="email" name="email" required class="w-full pl-10 pr-4 py-2.5 bg-zinc-950 border border-zinc-800 rounded-lg focus:outline-none focus:border-red-600 focus:ring-1 focus:ring-red-600 text-sm transition-all" placeholder="seuemail@empresa.com.br">
                </div>
            </div>

            <div>
                <label class="block text-xs font-semibold uppercase tracking-wider text-zinc-400 mb-2">Senha de Acesso</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-zinc-500">
                        <i class="fa-solid fa-lock"></i>
                    </span>
                    <input type="password" id="senha" name="senha" required class="w-full pl-10 pr-10 py-2.5 bg-zinc-950 border border-zinc-800 rounded-lg focus:outline-none focus:border-red-600 focus:ring-1 focus:ring-red-600 text-sm transition-all" placeholder="••••••••">
                    <span class="absolute inset-y-0 right-0 flex items-center pr-3 text-zinc-500 cursor-pointer hover:text-zinc-300" onclick="toggleSenha()">
                        <i id="icone-olho" class="fa-solid fa-eye"></i>
                    </span>
                </div>
            </div>

            <button type="submit" class="w-full py-3 mt-2 bg-red-700 hover:bg-red-800 text-white font-medium rounded-lg text-sm transition-colors shadow-lg hover:shadow-red-900/30 flex items-center justify-center gap-2">
                <i class="fa-solid fa-user-plus"></i> Concluir Cadastro
            </button>
        </form>

        <div class="text-center mt-6 border-t border-zinc-800 pt-4">
            <a href="/facilite" class="text-xs text-zinc-500 hover:text-red-500 transition-colors">
                <i class="fa-solid fa-arrow-left-long mr-1"></i> Voltar para a Home do Portal
            </a>
        </div>
    </div>

    <script>
        // 1. Alternar Visibilidade da Senha
        function toggleSenha() {
            const campo = document.getElementById('senha');
            const icone = document.getElementById('icone-olho');
            if (campo.type === 'password') {
                campo.type = 'text';
                icone.classList.remove('fa-eye');
                icone.classList.add('fa-eye-slash');
            } else {
                campo.type = 'password';
                icone.classList.remove('fa-eye-slash');
                icone.classList.add('fa-eye');
            }
        }

        // 2. Máscara Dinâmica de CPF / CNPJ
        const inputDocumento = document.querySelector('input[name="documento"]');
        
        inputDocumento.addEventListener('input', (e) => {
            let valor = e.target.value.replace(/\D/g, ""); // Remove tudo que não for número
            
            if (valor.length <= 11) {
                // Máscara de CPF: 000.000.000-00
                valor = valor.replace(/(\d{3})(\d)/, "$1.$2");
                valor = valor.replace(/(\d{3})(\d)/, "$1.$2");
                valor = valor.replace(/(\d{3})(\d{1,2})$/, "$1-$2");
            } else {
                // Máscara de CNPJ: 00.000.000/0001-00
                valor = valor.slice(0, 14); // Limita em 14 dígitos numéricos
                valor = valor.replace(/^(\d{2})(\d)/, "$1.$2");
                valor = valor.replace(/^(\d{2})\.(\d{3})(\d)/, "$1.$2.$3");
                valor = valor.replace(/\.(\d{3})(\d)/, ".$1/$2");
                valor = valor.replace(/(\d{4})(\d)/, "$1-$2");
            }
            
            e.target.value = valor;
        });

        // 3. Validação de segurança antes do Submit
        const form = document.querySelector('form');
        form.addEventListener('submit', (e) => {
            const senha = document.getElementById('senha').value;
            const documentoLimpo = inputDocumento.value.replace(/\D/g, "");

            if (documentoLimpo.length !== 11 && documentoLimpo.length !== 14) {
                e.preventDefault();
                alert('Por favor, insira um CPF ou CNPJ válido.');
                return;
            }

            if (senha.length < 6) {
                e.preventDefault();
                alert('A senha deve conter no mínimo 6 caracteres para garantir a segurança no ecossistema.');
                return;
            }
        });
    </script>
