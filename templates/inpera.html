<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8"><title>Portal Inpera Play</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0f172a] text-white min-h-screen pb-10">
    <nav class="bg-slate-900 px-8 py-4 flex items-center justify-between border-b border-blue-500/30">
        <span class="text-blue-500 font-black text-2xl tracking-wider">INPERA PLAY</span>
        <span class="text-xs bg-blue-600/20 text-blue-400 px-3 py-1 rounded border border-blue-500/40">Ambiente Inpera</span>
    </nav>
    
    <div class="px-8 my-8">
        <h2 class="text-lg font-bold mb-4 text-gray-300">Treinamentos Disponíveis - Inpera</h2>
        <div class="flex gap-4 overflow-x-auto pb-4">
            {% for curso in cursos %}
            <div class="min-w-[280px] bg-slate-800 rounded-md overflow-hidden border border-slate-700">
                <div class="h-36 bg-cover bg-center" style="background-image: url('{{ curso.imagem }}')"></div>
                <div class="p-4">
                    <span class="text-xs text-blue-400 font-bold">{{ curso.categoria }}</span>
                    <h3 class="font-bold text-sm mt-1">{{ curso.titulo }}</h3>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>

    <div class="px-8 max-w-4xl mx-auto">
        <div class="bg-slate-800 rounded-xl border border-blue-900/40 p-6">
            <h3 class="font-bold border-b border-slate-700 pb-2 mb-4">Suporte Inteligente Inpera</h3>
            <div id="chat-box" class="h-60 overflow-y-auto space-y-4 mb-4 p-2 bg-black/40 rounded-lg text-sm"></div>
            <div class="flex gap-2">
                <input type="text" id="input-p" placeholder="Dúvida sobre o Inpera..." class="flex-1 bg-slate-900 rounded-lg px-4 py-2 text-sm text-white focus:outline-none focus:border-blue-500 border border-transparent">
                <button onclick="enviar()" class="bg-blue-600 px-6 py-2 rounded-lg text-sm font-bold">Buscar</button>
            </div>
        </div>
    </div>

    <script>
        function enviar() {
            const input = document.getElementById('input-p');
            const box = document.getElementById('chat-box');
            if(!input.value.trim()) return;
            
            box.innerHTML += `<div class="p-2 bg-blue-950/30 text-right">Membro: ${input.value}</div>`;
            
            fetch('/perguntar_inpera', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ pergunta: input.value })
            })
            .then(res => res.json())
            .then(d => { box.innerHTML += `<div class="p-2 bg-slate-700"><b>IA Inpera:</b><br>${d.resposta.replace(/\n/g, '<br>')}</div>`; })
            input.value = "";
        }
    </script>
</body>
</html>
