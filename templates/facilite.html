<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8"><title>Portal Facilite Flix</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#141414] text-white min-h-screen pb-10">
    <nav class="bg-black px-8 py-4 flex items-center justify-between border-b border-red-600/30">
        <span class="text-red-600 font-black text-2xl tracking-wider">FACILITE FLIX</span>
        <span class="text-xs bg-red-600/20 text-red-400 px-3 py-1 rounded border border-red-600/40">Ambiente Facilite</span>
    </nav>
    
    <div class="px-8 my-8">
        <h2 class="text-lg font-bold mb-4 text-gray-300">Treinamentos Disponíveis - Facilite</h2>
        <div class="flex gap-4 overflow-x-auto pb-4">
            {% for curso in cursos %}
            <div class="min-w-[280px] bg-[#181818] rounded-md overflow-hidden border border-gray-800">
                <div class="h-36 bg-cover bg-center" style="background-image: url('{{ curso.imagem }}')"></div>
                <div class="p-4">
                    <span class="text-xs text-red-500 font-bold">{{ curso.categoria }}</span>
                    <h3 class="font-bold text-sm mt-1">{{ curso.titulo }}</h3>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>

    <div class="px-8 max-w-4xl mx-auto">
        <div class="bg-[#181818] rounded-xl border border-red-900/30 p-6">
            <h3 class="font-bold border-b border-gray-800 pb-2 mb-4">Suporte Inteligente Facilite</h3>
            <div id="chat-box" class="h-60 overflow-y-auto space-y-4 mb-4 p-2 bg-black/40 rounded-lg text-sm"></div>
            <div class="flex gap-2">
                <input type="text" id="input-p" placeholder="Dúvida sobre o Facilite..." class="flex-1 bg-[#282828] rounded-lg px-4 py-2 text-sm text-white focus:outline-none focus:border-red-600 border border-transparent">
                <button onclick="enviar()" class="bg-red-600 px-6 py-2 rounded-lg text-sm font-bold">Buscar</button>
            </div>
        </div>
    </div>

    <script>
        function enviar() {
            const input = document.getElementById('input-p');
            const box = document.getElementById('chat-box');
            if(!input.value.trim()) return;
            
            box.innerHTML += `<div class="p-2 bg-red-950/20 text-right">Membro: ${input.value}</div>`;
            
            fetch('/perguntar_facilite', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ pergunta: input.value })
            })
            .then(res => res.json())
            .then(d => { box.innerHTML += `<div class="p-2 bg-gray-800"><b>IA Facilite:</b><br>${d.resposta.replace(/\n/g, '<br>')}</div>`; })
            input.value = "";
        }
    </script>
</body>
</html>
